name: Deploy UAT Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to UAT server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.UAT_SSH_HOST }}
          username: ${{ secrets.UAT_SSH_USER }}
          key: ${{ secrets.UAT_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/ubuntu/dinify_backend_handover_uat
            source /home/ubuntu/venv_uat_handover/bin/activate
            git checkout -- .
            git clean -fd
            git pull origin main
            python3 manage.py migrate
            python3 manage.py check --deploy
            sudo systemctl restart apache2
